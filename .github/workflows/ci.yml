name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: distributed_api_service

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_REDIS_URL: redis://127.0.0.1:6379
      UPSTASH_REDIS_REST_URL: https://example.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-test-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  deploy:
    name: Build image and deploy to VPS
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "${{ env.IMAGE_NAME }}:latest" .

      - name: Save image archive
        run: docker save "${{ env.IMAGE_NAME }}:latest" | gzip > "${{ env.IMAGE_NAME }}.tar.gz"

      - name: Bundle compose files
        run: |
          mkdir -p bundle/docker/postgres
          cp docker-compose.yml bundle/
          cp docker/postgres/init.sql bundle/docker/postgres/
          tar -C bundle -czf compose-bundle.tar.gz .

      - name: Prepare deploy directory on VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            if [ -z "${DEPLOY_PATH}" ]; then
              echo "VPS_DEPLOY_PATH secret is empty"
              exit 1
            fi
            mkdir -p "${DEPLOY_PATH}"

      - name: Copy image and compose bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "${{ env.IMAGE_NAME }}.tar.gz,compose-bundle.tar.gz"
          target: /tmp/

      - name: Load image and start compose
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DEPLOY_PATH,IMAGE_NAME
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_PATH}" ]; then
              echo "VPS_DEPLOY_PATH secret is empty"
              exit 1
            fi

            echo "Loading ${IMAGE_NAME}:latest on VPS..."
            gunzip -c "/tmp/${IMAGE_NAME}.tar.gz" | docker load
            rm -f "/tmp/${IMAGE_NAME}.tar.gz"

            echo "Extracting compose files into ${DEPLOY_PATH}..."
            tar -C "${DEPLOY_PATH}" -xzf /tmp/compose-bundle.tar.gz
            rm -f /tmp/compose-bundle.tar.gz

            cd "${DEPLOY_PATH}"

            if [ ! -f .env ]; then
              echo "Missing ${DEPLOY_PATH}/.env on the VPS."
              echo "Create it once on the server (from .env.example), then re-run this workflow."
              exit 1
            fi

            echo "Starting 2 ${IMAGE_NAME} replicas (3005 + 3006)..."
            docker compose up -d --scale "${IMAGE_NAME}=2" --remove-orphans

            docker compose ps
            docker images "${IMAGE_NAME}"
